version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mining_cv_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: mining_cv_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 

  app:
    build: .
    container_name: mining_cv_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: mining_cv_db
      DB_USER: postgres
      DB_PASS: password
      DB_PORT: 5432
    volumes:
      - .:/app
    restart: unless-stopped

  api:
    build: .
    container_name: mining_cv_api
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: mining_cv_db
      DB_USER: postgres
      DB_PASS: password
      DB_PORT: 5432
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data: